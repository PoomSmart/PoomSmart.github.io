<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>PoomSmart's Repository</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Add PoomSmart's jailbreak repository to Cydia, Installer, Sileo, or Zebra.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/site.css">
</head>

<body class="page-shell">
    <main class="container py-5">
        <section class="page-section content-narrow mx-auto">
            <h1 class="mb-3">PoomSmart's Repository</h1>
            <p class="lead mb-4">Add this repository to your preferred package manager.</p>
            <div class="repo-actions" aria-label="Package manager links">
                <a class="repo-action" rel="nofollow noopener" href="cydia://url/https://cydia.saurik.com/api/share#?source=https://poomsmart.github.io/repo/">
                    <img src="https://poomsmart.github.io/web/cydia.png" loading="lazy" alt="Cydia icon">
                    <span class="repo-action-label">Cydia</span>
                </a>
                <a class="repo-action" rel="nofollow noopener" href="installer://add/repo=https://poomsmart.github.io/repo/">
                    <img src="https://poomsmart.github.io/web/installer.png" loading="lazy" alt="Installer icon">
                    <span class="repo-action-label">Installer</span>
                </a>
                <a class="repo-action" rel="nofollow noopener" href="sileo://source/https://poomsmart.github.io/repo/">
                    <img src="https://poomsmart.github.io/web/sileo.png" loading="lazy" alt="Sileo icon">
                    <span class="repo-action-label">Sileo</span>
                </a>
                <a class="repo-action" rel="nofollow noopener" href="zbra://sources/add/https://poomsmart.github.io/repo/">
                    <img src="https://poomsmart.github.io/web/zebra.png" loading="lazy" alt="Zebra icon">
                    <span class="repo-action-label">Zebra</span>
                </a>
            </div>
        </section>
        <section class="page-section content-narrow mx-auto">
            <h2 class="h4">Support Dev</h2>
            <p class="mb-0"><a href="https://paypal.me/poomsmart">paypal.me/poomsmart</a></p>
        </section>
    </main>
</body>

</html>
